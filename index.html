<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex seine Spielesammlung</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/webp" href="favicon.webp">
<link rel="apple-touch-icon" href="favicon.webp">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#111111" id="themeColorMeta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Games">
<style>
  /* ══════════════════════════════════════════════════════
     SPIELESAMMLUNG — Modern Collector Design
     ══════════════════════════════════════════════════════ */

  /* ── VARIABLES ── */
  :root {
    --bg:         #F2EDE4;
    --bg2:        #E8E1D6;
    --surface:    #FFFFFF;
    --surface2:   #F7F3EE;
    --border:     #D6CEBF;
    --text:       #1A1714;
    --text-dim:   #8A8178;
    --accent:     #C0392B;
    --accent2:    #2C3E7A;
    --green:      #1E8A4A;
    --purple:     #6C3F9E;
    --radius:     6px;
    --radius-lg:  12px;
    --shadow:     0 1px 4px rgba(0,0,0,0.08);
    --shadow-lg:  0 4px 20px rgba(0,0,0,0.12);
    --font-head:  'Barlow Condensed', sans-serif;
    --font-body:  'Inter', sans-serif;
    --font-mono:  'DM Mono', monospace;
  }

  [data-theme="dark"] {
    --bg:         #111111;
    --bg2:        #1A1A1A;
    --surface:    #222222;
    --surface2:   #2A2A2A;
    --border:     #404040;
    --text:       #F0ECE6;
    --text-dim:   #999999;
    --accent:     #FF5A4A;
    --accent2:    #7B9FEE;
    --green:      #3DDC84;
    --purple:     #B07EE8;
    --shadow:     0 1px 4px rgba(0,0,0,0.4);
    --shadow-lg:  0 4px 24px rgba(0,0,0,0.55);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* ── PARALLAX PIXEL BG ── */
  .parallax-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .px-sprite {
    position: absolute;
    opacity: 0.045;
    will-change: transform;
  }
  [data-theme="dark"] .px-sprite { opacity: 0.07; }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 1000;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.3px;
  }
  .theme-toggle:hover { border-color: var(--text-dim); color: var(--text); }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 48px 20px 28px;
    position: relative;
    z-index: 1;
  }

  .header-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    display: block;
  }

  h1 {
    font-family: var(--font-head);
    font-size: clamp(42px, 7vw, 80px);
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 8px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
    font-family: var(--font-mono);
  }

  .header-rule {
    width: 48px;
    height: 3px;
    background: var(--accent);
    margin: 20px auto 0;
    border-radius: 2px;
  }

  /* ── LOADING ── */
  #loadingOverlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 8000;
    gap: 20px;
    transition: opacity 0.4s;
  }
  #loadingOverlay.hidden { opacity: 0; pointer-events: none; }

  .loading-text {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 6px;
    text-transform: uppercase;
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .loading-bar-wrap {
    width: 200px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* ── TABS ── */
  .tab-bar {
    display: flex;
    justify-content: center;
    gap: 4px;
    padding: 20px 20px 0;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .tab-btn {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 22px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.18s;
  }
  .tab-btn:hover:not(.active):not(.check-active) {
    border-color: var(--text-dim);
    color: var(--text);
  }
  .tab-btn.active {
    background: var(--text);
    border-color: var(--text);
    color: var(--bg);
  }
  .tab-btn.check-active {
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    padding: 16px 20px 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }
  .stats-item span { color: var(--text); font-weight: 500; }
  .stats-divider { color: var(--border); }

  /* ── SEARCH ── */
  .search-wrap {
    display: flex;
    justify-content: center;
    padding: 16px 20px 8px;
    position: relative;
    z-index: 1;
  }

  .search-input {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-right: none;
    color: var(--text);
    padding: 10px 16px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    width: 100%;
    max-width: 360px;
    outline: none;
    border-radius: var(--radius) 0 0 var(--radius);
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--text-dim); }
  .search-input::placeholder { color: var(--text-dim); }

  .search-btn {
    background: var(--text);
    border: 1.5px solid var(--text);
    color: var(--bg);
    padding: 10px 16px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .search-btn:hover { opacity: 0.8; }

  /* ── ADD BAR ── */
  .add-bar {
    display: flex;
    justify-content: center;
    padding: 8px 20px 0;
    position: relative;
    z-index: 1;
  }

  .add-toggle-btn {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 20px;
    border: 1.5px solid var(--green);
    background: transparent;
    color: var(--green);
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.18s;
    margin-bottom: 28px;
  }
  .add-toggle-btn:hover, .add-toggle-btn.open {
    background: var(--green);
    color: #fff;
  }

  .add-form {
    display: none;
    justify-content: center;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 12px 20px 4px;
    position: relative;
    z-index: 1;
  }
  .add-form.open { display: flex; }

  .add-select {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    outline: none;
    cursor: pointer;
    min-width: 180px;
    border-radius: var(--radius);
  }

  .add-name-input {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 9px 16px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    outline: none;
    min-width: 240px;
    border-radius: var(--radius);
    transition: border-color 0.2s;
  }
  .add-name-input::placeholder { color: var(--text-dim); }
  .add-name-input:focus { border-color: var(--green); }

  .add-confirm-btn {
    background: var(--green);
    border: 1.5px solid var(--green);
    color: #fff;
    padding: 9px 20px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    border-radius: var(--radius);
  }
  .add-confirm-btn:hover { opacity: 0.85; }
  .add-confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── CHECK BOX ── */
  .check-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 8px;
    gap: 0;
    animation: fadeIn 0.2s ease;
    width: 100%;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

  .check-section {
    width: 100%;
    max-width: 500px;
    margin-bottom: 24px;
  }

  .check-section-label {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .check-row { display: flex; width: 100%; }

  .check-input {
    background: var(--surface);
    border: 1.5px solid var(--purple);
    border-right: none;
    color: var(--text);
    padding: 11px 16px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    outline: none;
    border-radius: var(--radius) 0 0 var(--radius);
  }
  .check-input::placeholder { color: var(--text-dim); }

  .check-btn {
    background: var(--purple);
    border: 1.5px solid var(--purple);
    color: #fff;
    padding: 11px 16px;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    border-radius: 0 var(--radius) var(--radius) 0;
    transition: opacity 0.18s;
  }
  .check-btn:hover { opacity: 0.85; }
  .check-btn-live { background: var(--accent2); border-color: var(--accent2); }
  .check-btn-save { background: var(--green); border-color: var(--green); }

  /* Shortcut buttons */
  .shortcut-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

  .shortcut-item {
    display: flex;
    align-items: stretch;
    border: 1.5px solid var(--accent2);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .shortcut-btn {
    background: transparent;
    border: none;
    color: var(--accent2);
    padding: 6px 14px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .shortcut-btn:hover { background: var(--accent2); color: #fff; }

  .shortcut-del {
    background: transparent;
    border: none;
    border-left: 1.5px solid var(--accent2);
    color: var(--text-dim);
    padding: 6px 9px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
  }
  .shortcut-del:hover { background: var(--accent); border-left-color: var(--accent); color: #fff; }

  /* ── PLATFORM GRID ── */
  .platform-grid {
    padding: 20px 0 0;
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .era-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 20px;
    position: relative;
    z-index: 1;
  }

  .era-buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .plat-btn {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 9px 12px;
    border: 1.5px solid;
    background: transparent;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.18s;
    text-align: left;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 6px;
    white-space: nowrap;
    overflow: hidden;
  }
  .plat-btn:hover { background: var(--surface); box-shadow: var(--shadow); }
  .plat-btn.active { background: var(--surface); box-shadow: var(--shadow-lg); }
  .plat-btn .count {
    font-size: 10px;
    opacity: 0.55;
    font-weight: 500;
    font-family: var(--font-mono);
    flex-shrink: 0;
    margin-left: auto;
  }
  .plat-btn .label-text {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  /* ── CONTENT ── */
  .content { max-width: 1400px; margin: 0 auto; padding: 20px 24px; display: none; position: relative; z-index: 1; }
  .content.visible { display: block; }

  .platform-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    padding: 20px 24px;
    background: var(--surface);
    border-left: 4px solid;
    border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
    box-shadow: var(--shadow);
  }

  .console-img { width: 110px; height: 110px; object-fit: contain; flex-shrink: 0; }
  .console-img-placeholder { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 40px; flex-shrink: 0; }
  .header-info h2 { font-family: var(--font-head); font-size: clamp(22px, 3vw, 32px); font-weight: 800; margin-bottom: 4px; letter-spacing: 0.5px; }
  .header-info p { font-size: 12px; color: var(--text-dim); letter-spacing: 2px; font-family: var(--font-mono); text-transform: uppercase; }

  /* ── GAMES LIST ── */
  .games-grid { display: flex; flex-direction: column; gap: 0; }

  .game-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    margin-bottom: 4px;
    background: var(--surface);
    border-left: 3px solid;
    border-radius: 0 var(--radius) var(--radius) 0;
    transition: background 0.15s, transform 0.15s;
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow);
  }
  .game-item:hover { transform: translateX(2px); background: var(--surface2); }

  .game-bullet { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: currentColor; opacity: 0.4; }
  .game-name { flex: 1; }

  .game-link {
    color: inherit;
    text-decoration: none;
    flex: 1;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .game-link:hover { opacity: 0.6; }

  .scan-btn {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.3px;
    padding: 2px 7px;
    border: 1px solid currentColor;
    color: inherit;
    text-decoration: none;
    opacity: 0.4;
    flex-shrink: 0;
    border-radius: 4px;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .scan-btn:hover { opacity: 0.9; }
  .sofort-btn { color: var(--green); border-color: var(--green); }

  .game-actions { display: flex; gap: 3px; flex-shrink: 0; }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 3px 5px;
    font-size: 12px;
    border-radius: 4px;
    line-height: 1;
    transition: background 0.15s;
    opacity: 0.5;
  }
  .icon-btn:hover { background: rgba(0,0,0,0.06); opacity: 1; }
  [data-theme="dark"] .icon-btn:hover { background: rgba(255,255,255,0.08); }
  .icon-btn.del { color: var(--accent); }
  .move-btn { color: var(--green); font-size: 14px; }
  .move-btn:hover { background: rgba(30,138,74,0.1) !important; }
  .icon-btn.del:hover { background: rgba(192,57,43,0.1); }
  .icon-btn:disabled { opacity: 0.2; cursor: not-allowed; }

  .game-edit-input {
    flex: 1;
    background: var(--bg2);
    border: 1.5px solid var(--accent2);
    color: var(--text);
    padding: 2px 8px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    border-radius: 4px;
    outline: none;
  }

  /* ── SWIPE RARITY BORDERS ── */
  .game-item-wrap.rarity-rare   .game-item { border-left-color: #C0392B; border-right: 3px solid #C0392B; background: rgba(192,57,43,0.04); }
  .game-item-wrap.rarity-medium .game-item { border-left-color: #C07A00; border-right: 3px solid #C07A00; background: rgba(192,122,0,0.04); }
  .game-item-wrap.rarity-common .game-item { border-left-color: #1E8A4A; border-right: 3px solid #1E8A4A; background: rgba(30,138,74,0.04); }
  [data-theme="dark"] .game-item-wrap.rarity-rare   .game-item { border-left-color: #E8483A; border-right-color: #E8483A; background: rgba(232,72,58,0.07); }
  [data-theme="dark"] .game-item-wrap.rarity-medium .game-item { border-left-color: #D4921A; border-right-color: #D4921A; background: rgba(212,146,26,0.07); }
  [data-theme="dark"] .game-item-wrap.rarity-common .game-item { border-left-color: #2ECC71; border-right-color: #2ECC71; background: rgba(46,204,113,0.07); }

  /* ── SWIPE ACTIONS ── */
  .game-item-wrap {
    position: relative;
    overflow: hidden;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin-bottom: 4px;
  }

  .swipe-actions {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    display: flex;
    align-items: stretch;
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 2;
    overflow: hidden;
  }

  .game-item-wrap.swiped .swipe-actions { transform: translateX(0); }
  .game-item-wrap.swiped .game-item { transform: translateX(216px); }

  /* Note panel slides in from right on swipe-left */
  .note-panel {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 216px;
    display: flex;
    align-items: stretch;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 2;
    overflow: hidden;
  }

  .game-item-wrap.note-swiped .note-panel { transform: translateX(0); }
  .game-item-wrap.note-swiped .game-item { transform: translateX(-216px); }

  .note-panel-inner {
    flex: 1;
    background: var(--surface2);
    border-left: 2px solid var(--accent2);
    display: flex;
    flex-direction: column;
    padding: 4px 6px;
  }

  .note-panel-textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 8px;
    resize: none;
    outline: none;
    height: 100%;
    min-height: 0;
    transition: border-color 0.2s;
  }
  .note-panel-textarea:focus { border-color: var(--accent2); }
  .note-panel-textarea::placeholder { color: var(--text-dim); font-size: 11px; }

  .game-item { transition: transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.15s; margin-bottom: 0; position: relative; z-index: 1; width: 100%; }

  .swipe-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 54px;
    border: none;
    cursor: pointer;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    gap: 4px;
    transition: filter 0.15s;
  }
  .swipe-btn:hover { filter: brightness(1.1); }

  /* ── NOTES ── */

  /* ── CONTEXT MENU ── */

    display: none;

  .ctx-separator { height: 1px; background: var(--border); margin: 2px 0; }

  #ctxNotePopup {
    position: fixed;
    z-index: 99999;

  .ctx-note-textarea {
    width: 100%;

  }
  .ctx-note-textarea:focus { border-color: var(--accent2); }
  .ctx-note-textarea::placeholder { color: var(--text-dim); }

  .ctx-note-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }

  .ctx-note-btn {
    padding: 6px 14px;
    border-radius: var(--radius);
    border: none;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .ctx-note-btn:hover { opacity: 0.8; }
  .ctx-note-save   { background: var(--accent2); color: #fff; }
  .ctx-note-cancel { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }

  /* ── CONFIRM MODAL ── */
  #confirmModal {
    display: none;
    position: fixed;
    inset: 0;

  #confirmModal.open { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);

  .modal-btns {

  .modal-btn {

  /* ── TOAST ── */
  #toast {

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FOOTER ── */
  footer {

  /* ── RESPONSIVE ── */

  }
</style>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzMZXeOIKEXkmYs2Exfnjd8TXHxCags3B-S_PA5OatwoGJ4WSRohfyio76UuvWWCO-P/exec";

const platforms = {
  "Atari":        {css:"c-atari",      label:"Atari 2600",      img:"img/atari.png",      color:"#D4874A"},
  "Commodore 64": {css:"c-c64",        label:"C64",             img:"",                   color:"#A0724A"},
  "NES":          {css:"c-nes",        label:"NES",             img:"img/nes.png",         color:"#D94040"},
  "Mastersystem": {css:"c-mastersystem",label:"Master System",  img:"img/mastersystem.png",color:"#2E8BC0"},
  "SNES":         {css:"c-snes",       label:"SNES",            img:"img/snes.png",        color:"#7B5EA7"},
  "Megadrive":    {css:"c-megadrive",  label:"Mega Drive",      img:"img/megadrive.png",   color:"#4A90D9"},
  "PS1":          {css:"c-ps1",        label:"PlayStation 1",   img:"img/ps1.png",         color:"#5B8ADB"},
  "Saturn":       {css:"c-saturn",     label:"Sega Saturn",     img:"img/saturn.png",      color:"#7A6ED4"},
  "N64":          {css:"c-n64",        label:"Nintendo 64",     img:"img/n64.png",         color:"#4DB86A"},
  "Gamecube":     {css:"c-gamecube",   label:"GameCube",        img:"img/gamecube.png",    color:"#7B5EA7"},
  "Ps2":          {css:"c-ps2",        label:"PlayStation 2",   img:"img/ps2.png",         color:"#3A7BD5"},
  "PS3":          {css:"c-ps3",        label:"PlayStation 3",   img:"img/ps3.png",         color:"#2E6FBF"},
  "PS4":          {css:"c-ps4",        label:"PlayStation 4",   img:"img/ps4.png",         color:"#2563AE"},
  "PS5":          {css:"c-ps5",        label:"PlayStation 5",   img:"img/ps5.png",         color:"#1A56A0"},
  "Switch":       {css:"c-switch",     label:"Nintendo Switch", img:"img/switch.png",      color:"#E8453C"},
  "Switch2":      {css:"c-switch2",    label:"Nintendo Switch 2",img:"img/switch.png",      color:"#E8453C"},
  "GB":           {css:"c-gb",         label:"Game Boy",        img:"img/gb.png",          color:"#7A9E7E"},
  "GBC":          {css:"c-gbc",        label:"Game Boy Color",  img:"img/gbc.png",         color:"#D4874A"},
  "GBA":          {css:"c-gba",        label:"Game Boy Advance",img:"img/gba.png",         color:"#A066CC"},
  "NDS":          {css:"c-nds",        label:"Nintendo DS",     img:"img/nds.png",         color:"#CC6633"},
  "3DS":          {css:"c-3ds",        label:"Nintendo 3DS",    img:"img/3ds.png",         color:"#CC3366"},
  "Konsole/Parts":{css:"c-parts",      label:"Konsolen & Teile",img:"img/konsole.png",     color:"#888888"},
  "Amiga 500":    {css:"c-amiga",      label:"Amiga 500",       img:"img/amiga.png",       color:"#CC8833"},
  "PC":           {css:"c-pc",         label:"PC",              img:"img/pc.png",          color:"#4A9E8A"},
};;;

let data = { Haben: {}, Brauchen: {} };
let currentTab = 'haben';
let currentPlatform = null;

function getTabKey() { return currentTab === 'haben' ? 'Haben' : 'Brauchen'; }
function getTabData() { return data[getTabKey()]; }

// ── API calls ──────────────────────────────────────────────────────────────
async function apiGet() {
  const res = await fetch(SCRIPT_URL);
  const json = await res.json();
  if (json.status !== 'ok') throw new Error(json.message);
  return json.data;
}

async function apiPost(payload) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (json.status !== 'ok') throw new Error(json.message);
}

// ── Init: load from Sheets ─────────────────────────────────────────────────
async function init() {
  const bar = document.getElementById('loadingBar');
  const txt = document.getElementById('loadingText');

  // Animate bar to 80% quickly, hold there while waiting
  let pct = 0;
  const ticker = setInterval(() => {
    pct = pct < 75 ? pct + 3 : pct < 85 ? pct + 0.2 : pct;
    if (bar) bar.style.width = pct + '%';
  }, 80);

  // Timeout warning after 5 seconds
  const warnTimer = setTimeout(() => {
    if (txt) txt.textContent = 'VERBINDE...';
  }, 5000);

  try {
    const loaded = await apiGet();
    // Separate meta from game data
    metaCache = loaded['Meta'] || {};
    delete loaded['Meta'];
    data = loaded;
    clearInterval(ticker);
    clearTimeout(warnTimer);
    if (bar) bar.style.width = '100%';
    renderPlatformButtons();
    updateValueDisplay();
    setTimeout(() => {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }, 300);
  } catch(e) {
    clearInterval(ticker);
    clearTimeout(warnTimer);
    const errMsg = e && e.message ? e.message : String(e);
    document.getElementById('loadingOverlay').innerHTML =
      '<div class="loading-text" style="color:var(--accent)">FEHLER</div>' +
      '<div style="color:var(--text-dim);font-size:12px;margin-top:12px;font-family:Nunito,sans-serif;padding:0 20px;text-align:center;word-break:break-all">' + errMsg + '</div>' +
      '<div style="color:var(--text-dim);font-size:11px;margin-top:16px;font-family:Nunito,sans-serif">Seite neu laden zum Wiederholen</div>';
    console.error(e);
  }
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = (isError ? 'error' : '') + ' show';
  setTimeout(() => { t.className = isError ? 'error' : ''; }, 2400);
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(text, onConfirm) {
  document.getElementById('modalText').textContent = text;
  document.getElementById('modalConfirmBtn').onclick = function() { closeModal(); onConfirm(); };
  document.getElementById('confirmModal').classList.add('open');
}
function closeModal() { document.getElementById('confirmModal').classList.remove('open'); }

// ── Add form ───────────────────────────────────────────────────────────────
function toggleAddForm() {
  const form = document.getElementById('addForm');
  const btn  = document.getElementById('addToggleBtn');
  const open = form.classList.toggle('open');
  btn.classList.toggle('open', open);
  if (open) { populateAddSelect(); setTimeout(() => document.getElementById('addNameInput').focus(), 50); }
}

function populateAddSelect() {
  const sel = document.getElementById('addPlatformSelect');
  sel.innerHTML = '';
  // Always use all platforms from "Haben" as options
  const platformKeys = Object.keys(data['Haben']);
  platformKeys.forEach(function(key) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = (platforms[key] || {label:key}).label;
    if (currentPlatform && key === currentPlatform) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function confirmAdd() {
  const platform = document.getElementById('addPlatformSelect').value;
  const name = document.getElementById('addNameInput').value.trim();
  if (!name) { showToast('Bitte einen Spieltitel eingeben!', true); return; }

  const btn = document.getElementById('addConfirmBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> SPEICHERN...';

  try {
    await apiPost({ action: 'add', tab: getTabKey(), platform, game: name });
    // Update local data
    if (!data[getTabKey()][platform]) data[getTabKey()][platform] = [];
    data[getTabKey()][platform].push(name);
    data[getTabKey()][platform].sort((a,b) => a.localeCompare(b,'de'));
    document.getElementById('addNameInput').value = '';
    showToast('"' + name + '" wurde hinzugefuegt');
    if (currentPlatform === platform) renderGames();
    renderPlatformButtons();
    updateValueDisplay();
  } catch(e) {
    showToast('Fehler: ' + e.message, true);
  }

  btn.disabled = false;
  btn.innerHTML = '&#10004; EINTRAGEN';
}

// ── Platform buttons ───────────────────────────────────────────────────────

// Fixed display order – exactly as specified
const platformOrder = [
  "Atari", "Amiga 500", "PC", "NES", "Mastersystem",
  "SNES", "Megadrive", "PS1", "Saturn", "N64",

function renderPlatformButtons() {
  const tabData = getTabData();
  const grid = document.getElementById('platformGrid');
  grid.innerHTML = '';
  grid.style.display = 'block';
  grid.style.padding = '0';

  const section = document.createElement('div');
  section.className = 'era-section';
  const btns = document.createElement('div');
  btns.className = 'era-buttons';

  let total = 0;

  // Render in fixed order first
  const rendered = new Set();
  platformOrder.forEach(function(key) {
    const games = tabData[key];
    if (!games || games.length === 0) return;
    const cfg = platforms[key] || {css:'c-parts', label:key, color:'#888'};
    const btn = document.createElement('button');
    btn.className = 'plat-btn ' + cfg.css + (currentPlatform === key ? ' active' : '');
    btn.dataset.key = key;
    const col = cfg.color || '#888';
    btn.style.color = col;
    btn.style.borderColor = col;
    btn.innerHTML = '<span class="label-text">' + cfg.label + '</span><span class="count">' + games.length + '</span>';
    btn.onclick = function() { selectPlatform(key); };
    btns.appendChild(btn);
    total += games.length;
    rendered.add(key);
  });

  // Any platform not in fixed order appended at end
  Object.entries(tabData).forEach(function(entry) {
    const key = entry[0]; const games = entry[1];
    if (rendered.has(key) || !games || games.length === 0) return;
    const cfg = platforms[key] || {css:'c-parts', label:key, color:'#888'};
    const btn = document.createElement('button');
    btn.className = 'plat-btn ' + cfg.css + (currentPlatform === key ? ' active' : '');
    btn.dataset.key = key;
    const col = cfg.color || '#888';
    btn.style.color = col;
    btn.style.borderColor = col;
    btn.innerHTML = '<span class="label-text">' + cfg.label + '</span><span class="count">' + games.length + '</span>';
    btn.onclick = function() { selectPlatform(key); };
    btns.appendChild(btn);
    total += games.length;
  });

  section.appendChild(btns);
  grid.appendChild(section);
  document.getElementById('totalCount').textContent = total;
}

function selectPlatform(key) {
  currentPlatform = key;
  document.querySelectorAll('.plat-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.key === key);
  });
  renderGames();
}

// ── Games ──────────────────────────────────────────────────────────────────
function renderGames() {
  if (!currentPlatform) return;
  const games = getTabData()[currentPlatform] || [];
  const cfg = platforms[currentPlatform] || {css:'c-parts', label:currentPlatform, emoji:'?', img:''};
  const content = document.getElementById('gameContent');
  content.classList.add('visible');

  const imgHtml = cfg.img
    ? '<img class="console-img ' + cfg.css + '" src="' + cfg.img + '" alt="' + cfg.label + '" onerror="this.style.display=\'none\'">'
    : '<div class="console-img-placeholder">' + cfg.emoji + '</div>';

  const gamesHtml = games.length === 0
    ? '<div class="no-games">-- NOCH KEINE SPIELE --</div>'
    : '<div class="games-grid">' + games.map(function(g, i){ return gameItemHtml(g, i, cfg); }).join('') + '</div>';

  content.innerHTML =
    '<div class="platform-header" style="border-left-color:' + platColor + '">' +
      imgHtml +
      '<div class="header-info">' +

        '<p>' + games.length + ' SPIEL' + (games.length !== 1 ? 'E' : '') + '</p>' +
      '</div>' +
    '</div>' + gamesHtml;

function ebayUrl(name, platform) {
  const query = encodeURIComponent(name + ' ' + platform);
  // LH_Sold=1 = verkaufte Artikel, LH_Complete=1 = beendete Angebote, LH_Auction=1 = nur Auktionen
  return 'https://www.ebay.de/sch/i.html?_nkw=' + query + '&LH_Sold=1&LH_Complete=1&LH_Auction=1';
}

// ── Meta (rarity + notes) – synced via Google Sheet ─────────────────────────
// metaCache: { "platform::game": { rarity, note } }
let metaCache = {};

function metaKey(name, platform) { return platform + '::' + name; }

function getRarity(name, platform) {
  const m = metaCache[metaKey(name, platform)];
  return m ? (m.rarity || null) : null;
}

function getNote(name, platform) {
  const m = metaCache[metaKey(name, platform)];
  return m ? (m.note || '') : '';
}

async function syncMeta(platform, name, rarity, note) {
  const k = metaKey(name, platform);
  if (!metaCache[k]) metaCache[k] = {};
  metaCache[k].rarity = rarity;
  metaCache[k].note   = note !== undefined ? note : (metaCache[k].note || '');
  try {
    await apiPost({ action: 'setMeta', platform, game: name, rarity: rarity || '', note: metaCache[k].note });
  } catch(e) { console.error('Meta sync failed:', e); }
}

function setRarity(index, rarity) {
  const name = getTabData()[currentPlatform][index];
  const wrap = document.getElementById('giw-' + index);
  const curNote = getNote(name, currentPlatform);
  if (rarity === null) {
    if (wrap) { wrap.classList.remove('rarity-rare','rarity-medium','rarity-common'); }
    showToast('"' + name + '" Seltenheit entfernt');
  } else {
    if (wrap) {
      wrap.classList.remove('rarity-rare','rarity-medium','rarity-common');
      wrap.classList.add('rarity-' + rarity);
    }
    const label = rarity === 'rare' ? 'Selten' : rarity === 'medium' ? 'Medium' : 'Haeufig';
    showToast('"' + name + '" -> ' + label);
  }
  if (wrap) wrap.classList.remove('swiped');
  syncMeta(currentPlatform, name, rarity, curNote);
}

function saveNote(index) {
  const name = getTabData()[currentPlatform][index];
  const ta = document.getElementById('note-ta-' + index);
  if (!ta) return;
  const val = ta.value.trim();
  const curRarity = getRarity(name, currentPlatform);
  const ind = document.getElementById('note-ind-' + index);
  if (ind) { ind.style.display = val ? 'inline' : 'none'; }
  syncMeta(currentPlatform, name, curRarity, val);
}

function gameItemHtml(name, index, cfg) {
  const safe = name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const soldUrl = ebayUrl(name, cfg.label);
  const auctionUrl = 'https://www.ebay.de/sch/i.html?_nkw=' + encodeURIComponent(name + ' ' + cfg.label) + '&LH_Auction=1&_sop=1';
  const binUrl = 'https://www.ebay.de/sch/i.html?_nkw=' + encodeURIComponent(name + ' ' + cfg.label) + '&LH_BIN=1';

  const moveBtn = currentTab === 'brauchen'
    ? '<button class="icon-btn move-btn" title="Zu Haben verschieben" onclick="moveToHaben(' + index + ')">&#10003;</button>'
    : '';

  const rarityVal = getRarity(name, currentPlatform);
  const rarityClass = rarityVal ? ' rarity-' + rarityVal : '';

  const noteVal = getNote(name, currentPlatform);
  const noteSafe = noteVal.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const noteIndStyle = noteVal ? '' : 'display:none';

  const itemHtml =
    '<div class="game-item" style="border-left-color:' + (cfg.color||'var(--accent)') + ';color:var(--text)" id="gi-' + index + '">' +
      '<span class="game-bullet ' + cfg.css + '"></span>' +
      '<a class="game-name game-link" href="' + soldUrl + '" target="_blank" title="Beendete Angebote">' + safe + '</a>' +
      '<span class="note-indicator" id="note-ind-' + index + '" style="' + noteIndStyle + '" title="Notiz vorhanden">&#128203;</span>' +
      '<a class="scan-btn" href="' + auctionUrl + '" target="_blank" title="Laufende Auktionen">Auktion</a>' +
      '<a class="scan-btn sofort-btn" href="' + binUrl + '" target="_blank" title="Sofortkauf">Sofortkauf</a>' +
      moveBtn +
      '<span class="game-actions">' +
        '<button class="icon-btn" title="Bearbeiten" onclick="startEdit(' + index + ')">&#9999;&#65039;</button>' +
        '<button class="icon-btn del" title="Loeschen" onclick="deleteGame(' + index + ')">&#10005;</button>' +
      '</span>' +
    '</div>';

  const notePanelHtml =
    '<div class="note-panel" id="note-' + index + '">' +
      '<div class="note-panel-inner">' +
        '<textarea class="note-panel-textarea" id="note-ta-' + index + '" placeholder="Notiz..." oninput="saveNote(' + index + ')">' + noteSafe + '</textarea>' +
      '</div>' +
    '</div>';

  const swipeHtml =
    '<div class="swipe-actions">' +
      '<button class="swipe-btn rare"   onclick="setRarity(' + index + ',\'rare\')"><span class="swipe-icon">&#128308;</span>Selten</button>' +
      '<button class="swipe-btn medium" onclick="setRarity(' + index + ',\'medium\')"><span class="swipe-icon">&#128993;</span>Medium</button>' +
      '<button class="swipe-btn common" onclick="setRarity(' + index + ',\'common\')"><span class="swipe-icon">&#128994;</span>Haeufig</button>' +
      '<button class="swipe-btn clear"  onclick="setRarity(' + index + ',null)"><span class="swipe-icon">&#10006;</span>Reset</button>' +
    '</div>';

  return '<div class="game-item-wrap' + rarityClass + '" id="giw-' + index + '" oncontextmenu="openRarityMenu(event,' + index + ')">' + itemHtml + notePanelHtml + swipeHtml + '</div>';
}


function startEdit(index) {
  const currentName = getTabData()[currentPlatform][index];
  const cfg = platforms[currentPlatform] || {css:'c-parts'};
  const wrap = document.getElementById('giw-' + index);
  const item = document.getElementById('gi-' + index);
  if (!item) return;
  if (wrap) wrap.classList.remove('swiped');
  const safe = currentName.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  item.innerHTML =
    '<span class="game-bullet ' + cfg.css + '"></span>' +
    '<input class="game-edit-input" id="edit-' + index + '" value="' + safe + '" onkeydown="handleEditKey(event,' + index + ')">' +
    '<span class="game-actions" style="opacity:1">' +
      '<button class="icon-btn" id="save-' + index + '" title="Speichern" onclick="saveEdit(' + index + ')">&#10004;</button>' +
      '<button class="icon-btn del" title="Abbrechen" onclick="renderGames()">&#10005;</button>' +
    '</span>';
  document.getElementById('edit-' + index).focus();
}

function handleEditKey(e, index) {
  if (e.key === 'Enter') saveEdit(index);
  if (e.key === 'Escape') renderGames();
}

async function saveEdit(index) {
  const input = document.getElementById('edit-' + index);
  if (!input) return;
  const newName = input.value.trim();
  if (!newName) { showToast('Name darf nicht leer sein!', true); return; }

  const oldName = getTabData()[currentPlatform][index];
  if (oldName === newName) { renderGames(); return; }

  const saveBtn = document.getElementById('save-' + index);
  if (saveBtn) { saveBtn.disabled = true; saveBtn.innerHTML = '<span class="spinner"></span>'; }
  input.disabled = true;

  try {
    await apiPost({ action: 'edit', tab: getTabKey(), platform: currentPlatform, game: oldName, newName });
    data[getTabKey()][currentPlatform][index] = newName;
    data[getTabKey()][currentPlatform].sort((a,b) => a.localeCompare(b,'de'));
    showToast('"' + oldName + '" umbenannt');
    renderGames();
    renderPlatformButtons();
  } catch(e) {
    showToast('Fehler: ' + e.message, true);
    renderGames();
  }
}

function deleteGame(index) {
  const name = getTabData()[currentPlatform][index];
  openModal('"' + name + '" wirklich loeschen?', async function() {
    try {
      await apiPost({ action: 'delete', tab: getTabKey(), platform: currentPlatform, game: name });
      data[getTabKey()][currentPlatform].splice(index, 1);
      showToast('"' + name + '" geloescht');
      renderGames();
      renderPlatformButtons();
      updateValueDisplay();
    } catch(e) {
      showToast('Fehler: ' + e.message, true);
    }
  });
}

function switchTab(tab) {
  currentTab = tab;
  currentPlatform = null;

  // Tab button styles
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.remove('active','check-active');
    if (i === 0 && tab === 'haben') b.classList.add('active');
    else if (i === 1 && tab === 'brauchen') b.classList.add('active');
    else if (i === 2 && tab === 'check') b.classList.add('check-active');
  });

  const isCheck = tab === 'check';
  document.getElementById('checkBox').style.display     = isCheck ? 'flex' : 'none';
  document.getElementById('platformGrid').style.display = isCheck ? 'none' : '';
  document.getElementById('gameContent').classList.remove('visible');
  document.getElementById('gameContent').innerHTML = '';
  document.getElementById('searchResultsBox').style.display = 'none';
  document.getElementById('searchInput').parentElement.style.display = isCheck ? 'none' : 'flex';
  document.getElementById('addToggleBtn').parentElement.style.display = isCheck ? 'none' : 'flex';
  const addForm = document.getElementById('addForm');
  if (isCheck) { addForm.classList.remove('open'); document.getElementById('addToggleBtn').classList.remove('open'); }
  else { addForm.style.display = ''; }

  if (!isCheck) {
    if (addForm.classList.contains('open')) populateAddSelect();
    renderPlatformButtons();
  } else {
    setTimeout(function(){ document.getElementById('checkInput').focus(); renderShortcuts(); }, 50);
  }
}

// ── Search ─────────────────────────────────────────────────────────────────
function doSearch() {
  const term = document.getElementById('searchInput').value.trim().toLowerCase();
  const box = document.getElementById('searchResultsBox');
  if (!term) { box.style.display = 'none'; box.innerHTML = ''; return; }
  const tabData = getTabData();
  let totalFound = 0;
  let html = '';
  const esc = function(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); };
  Object.entries(tabData).forEach(function([key, games]) {
    const matches = games.filter(function(g){ return g.toLowerCase().includes(term); });
    if (!matches.length) return;
    totalFound += matches.length;
    const cfg = platforms[key] || {css:'c-parts', label:key};
    const items = matches.map(function(g) {
      const safe = g.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const display = safe.replace(new RegExp('(' + esc(term) + ')', 'gi'), '<mark class="highlight">$1</mark>');
      return '<div class="game-item ' + cfg.css + '"><span class="game-bullet ' + cfg.css + '"></span><span class="game-name">' + display + '</span></div>';
    }).join('');
    html += '<div class="search-platform-group">' +
      '<div class="search-platform-label ' + cfg.css + '">' + cfg.label + ' (' + matches.length + ')</div>' +
      '<div class="games-grid">' + items + '</div>' +
      '</div>';
  });
  box.innerHTML = totalFound === 0
    ? '<div class="no-games">-- KEINE SPIELE GEFUNDEN --</div>'
    : '<div class="search-results-title">&#128269; ' + totalFound + ' Treffer fuer "' + term.toUpperCase() + '"</div>' + html;
  box.style.display = 'block';
  box.scrollIntoView({behavior:'smooth', block:'start'});
}

// Spiele die bekanntermaßen mehr wert sind (Multiplikator)
const rareKeywords = [
  {words: ['ovp','(ovp)'],        mult: 3.5},
  {words: ['sealed'],             mult: 4.0},
  {words: ['steelbook'],          mult: 2.2},
  {words: ['big box'],            mult: 5.0},
  {words: ['limited'],            mult: 2.5},

  {words: ['illusion of time'],   mult: 3.5},
  {words: ['conker'],             mult: 7.0},
  {words: ['panzer dragoon'],     mult: 5.0},
  {words: ['castlevania'],        mult: 3.0},

  {words: ['pokemon','pokémon'],  mult: 3.5},
  {words: ['mega man x3'],        mult: 6.0},
  {words: ['valkyria chronicles'],mult: 3.0},
  {words: ['elden ring'],         mult: 2.0},
  {words: ['diablo'],             mult: 3.5},
  {words: ['monkey island'],      mult: 6.0},
];

function estimateGamePrice(name, platform) {
  const base = platformAvgPrice[platform] || 10;
  const lower = name.toLowerCase();
  let mult = 1.0;
  for (const r of rareKeywords) {
    if (r.words.some(w => lower.includes(w))) {
      mult = Math.max(mult, r.mult);
    }
  }
  return Math.round(base * mult);
}

function estimateTotalValue() {
  let total = 0;
  const haben = data['Haben'] || {};
  for (const [platform, games] of Object.entries(haben)) {
    for (const game of games) {
      total += estimateGamePrice(game, platform);
    }
  }
  return total;
}

function updateValueDisplay() {
  const total = estimateTotalValue();
  const el = document.getElementById('collectionValue');
  if (el) el.textContent = '~' + total.toLocaleString('de-DE') + ' €';
}

async function moveToHaben(index) {
  const tabData = getTabData();
  const name = tabData[currentPlatform][index];
  const platform = currentPlatform;

  // Check if platform exists in Haben
  if (!data['Haben'][platform]) data['Haben'][platform] = [];

  try {
    // Add to Haben
    await apiPost({ action: 'add', tab: 'Haben', platform, game: name });
    data['Haben'][platform].push(name);
    data['Haben'][platform].sort((a,b) => a.localeCompare(b,'de'));

    // Remove from Brauchen
    await apiPost({ action: 'delete', tab: 'Brauchen', platform, game: name });
    data['Brauchen'][platform].splice(index, 1);

    showToast('"' + name + '" → Haben ✓');
    renderGames();
    renderPlatformButtons();
    updateValueDisplay();
  } catch(e) {
    showToast('Fehler: ' + e.message, true);
  }
}

// ── Desktop right-click context menu ─────────────────────────────────────────
let ctxIndex = null;

function openRarityMenu(e, index) {
  e.preventDefault();
  ctxIndex = index;
  const name = getTabData()[currentPlatform][index];
  const safe = name.length > 28 ? name.slice(0, 26) + '...' : name;
  document.getElementById('ctxMenuTitle').textContent = safe;
  const menu = document.getElementById('rarityContextMenu');
  menu.style.display = 'block';
  // Position near cursor, keep within viewport
  const mw = 170, mh = 160;
  let x = e.clientX, y = e.clientY;
  if (x + mw > window.innerWidth)  x = window.innerWidth - mw - 8;
  if (y + mh > window.innerHeight) y = window.innerHeight - mh - 8;
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
}

function closeRarityMenu() {
  document.getElementById('rarityContextMenu').style.display = 'none';
  ctxIndex = null;
}

function ctxSetRarity(rarity) {
  if (ctxIndex === null) return;
  setRarity(ctxIndex, rarity);
  closeRarityMenu();
}

function ctxOpenNote() {
  if (ctxIndex === null) return;
  const savedIndex = ctxIndex; // save before closeRarityMenu resets it
  const name = getTabData()[currentPlatform][savedIndex];
  const note = getNote(name, currentPlatform);
  const safe = name.length > 30 ? name.slice(0, 28) + '...' : name;

  const popup = document.getElementById('ctxNotePopup');
  const menu  = document.getElementById('rarityContextMenu');
  const menuRect = menu.getBoundingClientRect();

  document.getElementById('ctxNoteTitle').textContent = safe;
  document.getElementById('ctxNoteTextarea').value = note;

  closeRarityMenu();
  ctxIndex = savedIndex; // restore after closeRarityMenu nulled it

  popup.style.display = 'block';
  // position near where menu was
  const pw = 260, ph = 160;
  let x = menuRect.left, y = menuRect.top;
  if (x + pw > window.innerWidth)  x = window.innerWidth - pw - 8;
  if (y + ph > window.innerHeight) y = window.innerHeight - ph - 8;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';

  setTimeout(function() {
    const ta = document.getElementById('ctxNoteTextarea');
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }, 50);
}

function ctxSaveNote() {
  if (ctxIndex === null) return;
  const name = getTabData()[currentPlatform][ctxIndex];
  const val  = document.getElementById('ctxNoteTextarea').value.trim();
  const curRarity = getRarity(name, currentPlatform);
  const ind = document.getElementById('note-ind-' + ctxIndex);
  if (ind) { ind.style.display = val ? 'inline' : 'none'; }
  syncMeta(currentPlatform, name, curRarity, val);
  ctxCloseNote();
  showToast(val ? 'Notiz gespeichert' : 'Notiz gelöscht');
}

function ctxCloseNote() {
  document.getElementById('ctxNotePopup').style.display = 'none';
  ctxIndex = null;
}

document.addEventListener('click', function(e) {
  const menu   = document.getElementById('rarityContextMenu');
  const popup  = document.getElementById('ctxNotePopup');
  if (menu  && !menu.contains(e.target))  closeRarityMenu();
  if (popup && !popup.contains(e.target) && popup.style.display !== 'none') ctxCloseNote();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeRarityMenu(); ctxCloseNote(); }
  if (e.key === 'Enter' && e.ctrlKey) {
    const popup = document.getElementById('ctxNotePopup');
    if (popup && popup.style.display !== 'none') ctxSaveNote();
  }
});

// ── Swipe-to-reveal (touch) ────────────────────────────────────────────────
// Swipe RIGHT → rarity buttons (from left)
// Swipe LEFT  → note panel (from right)
(function() {
  let touchStartX = 0;
  let touchStartY = 0;
  let activeWrap = null;

  function getWrap(el) {
    while (el && el !== document.body) {
      if (el.classList && el.classList.contains('game-item-wrap')) return el;
      el = el.parentElement;
    }
    return null;
  }

  function closeAllRarity(except) {
    document.querySelectorAll('.game-item-wrap.swiped').forEach(function(w) {
      if (w !== except) w.classList.remove('swiped');
    });
  }

  function closeAllNote(except) {
    document.querySelectorAll('.game-item-wrap.note-swiped').forEach(function(w) {
      if (w !== except) w.classList.remove('note-swiped');
    });
  }

  function closeAll(except) {
    closeAllRarity(except);
    closeAllNote(except);
  }

  document.addEventListener('touchstart', function(e) {
    const wrap = getWrap(e.target);
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    activeWrap = wrap;
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!activeWrap) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < Math.abs(dy) * 1.5) { activeWrap = null; return; }

    const isRarityOpen = activeWrap.classList.contains('swiped');
    const isNoteOpen   = activeWrap.classList.contains('note-swiped');

    if (dx > 40) {
      // swipe right
      if (isNoteOpen) {
        // note is open → just close it
        activeWrap.classList.remove('note-swiped');
      } else if (isRarityOpen) {
        // rarity already open → close it
        activeWrap.classList.remove('swiped');
      } else {
        // nothing open → open rarity
        closeAll(activeWrap);
        activeWrap.classList.add('swiped');
      }
    } else if (dx < -40) {
      // swipe left
      if (isRarityOpen) {
        // rarity is open → just close it
        activeWrap.classList.remove('swiped');
      } else if (isNoteOpen) {
        // note already open → close it
        activeWrap.classList.remove('note-swiped');
      } else {
        // nothing open → open note
        closeAll(activeWrap);
        activeWrap.classList.add('note-swiped');
        const ta = activeWrap.querySelector('.note-panel-textarea');
        if (ta) setTimeout(function(){ ta.focus(); }, 300);
      }
    }
    activeWrap = null;
  }, { passive: true });

  // Close on tap outside
  document.addEventListener('touchstart', function(e) {
    const wrap = getWrap(e.target);
    if (!wrap) closeAll(null);
  }, { passive: true });
})();

// ── Check Tab functions ───────────────────────────────────────────────────────
function doEbayCheck() {
  const name = document.getElementById('checkInput').value.trim();
  if (!name) { document.getElementById('checkInput').focus(); return; }
  const url = 'https://www.ebay.de/sch/i.html?_nkw=' + encodeURIComponent(name) + '&LH_Sold=1&LH_Complete=1&LH_Auction=1';
  window.open(url, '_blank');
}

function doLiveCheck() {
  const name = document.getElementById('liveInput').value.trim();
  if (!name) { document.getElementById('liveInput').focus(); return; }
  // LH_Auction=1 laufende Auktionen, _sop=1 = endend bald
  const url = 'https://www.ebay.de/sch/i.html?_nkw=' + encodeURIComponent(name) + '&LH_Auction=1&_sop=1';
  window.open(url, '_blank');
}

function openLiveSearch(term) {
  const url = 'https://www.ebay.de/sch/i.html?_nkw=' + encodeURIComponent(term) + '&LH_Auction=1&_sop=1';
  window.open(url, '_blank');
}

function getShortcuts() {
  try { return JSON.parse(localStorage.getItem('ebay_shortcuts') || '[]'); } catch(e) { return []; }
}

function saveShortcuts(arr) {
  localStorage.setItem('ebay_shortcuts', JSON.stringify(arr));
}

function addShortcut() {
  const input = document.getElementById('shortcutInput');
  const term = input.value.trim();
  if (!term) { input.focus(); return; }
  const shortcuts = getShortcuts();
  if (shortcuts.includes(term)) { showToast('Shortcut existiert bereits', true); return; }
  shortcuts.push(term);
  saveShortcuts(shortcuts);
  input.value = '';
  renderShortcuts();
  showToast('"' + term + '" gespeichert');
}

function deleteShortcut(term) {
  const shortcuts = getShortcuts().filter(function(s) { return s !== term; });
  saveShortcuts(shortcuts);
  renderShortcuts();
}

function renderShortcuts() {
  const list = document.getElementById('shortcutList');
  if (!list) return;
  const shortcuts = getShortcuts();
  if (shortcuts.length === 0) {
    list.innerHTML = '<span style="font-size:13px;color:var(--text-dim);font-family:Nunito,sans-serif;">Noch keine Shortcuts gespeichert.</span>';
    return;
  }
  list.innerHTML = shortcuts.map(function(term) {
    const safe = term.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const esc = term.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div class="shortcut-item">' +
      '<button class="shortcut-btn" onclick="openLiveSearch(\'' + esc + '\')">' + safe + '</button>' +
      '<button class="shortcut-del" onclick="deleteShortcut(\'' + esc + '\')" title="Loeschen">&#10006;</button>' +
      '</div>';
  }).join('');
}

init();
</script>
